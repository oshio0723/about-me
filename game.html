      <hr width="1860" size="5" noshade="">
      <div id="copyright" class="copyright hidden">
        <small>&copy; 2026 尾塩知彦</small>
      </div>
      <script>
        const contactSection = document.getElementById('contact');
        const copyrightEl = document.getElementById('copyright');

        if (contactSection && copyrightEl) {
          const observer = new IntersectionObserver(entries => {
            entries.forEach(entry => {
              if (entry.isIntersecting) {
                copyrightEl.classList.remove('hidden');
              } else {
                copyrightEl.classList.add('hidden');
              }
            });
          }, { threshold: 0.4 });

          observer.observe(contactSection);
        }

        const wrapper = document.querySelector('.scroll-wrapper');
        const sections = Array.from(document.querySelectorAll('.page-section'));
        // 初回読み込み時に最初のセクションを表示するために短い遅延で active を付与（フェードインを確実にする）
        if (sections.length) setTimeout(() => sections[0].classList.add('active'), 50);

        if (wrapper && sections.length) {
          const sectionRatio = new Map();

          const updateActive = () => {
            const best = sections.reduce((current, section) => {
              const ratio = sectionRatio.get(section) || 0;
              return ratio > (current.ratio || 0) ? { section, ratio } : current;
            }, { section: sections[0], ratio: 0 });

            sections.forEach(section => {
              section.classList.toggle('active', section === best.section);
            });
          };

          const sectionObserver = new IntersectionObserver(entries => {
            entries.forEach(entry => {
              sectionRatio.set(entry.target, entry.intersectionRatio);
            });
            updateActive();
          }, {
            root: wrapper,
            threshold: [0, 0.25, 0.5, 0.75, 1],
          });

          sections.forEach(section => sectionObserver.observe(section));
          updateActive();
        }
      </script>
